services:
  - type: web
    name: ai-ticket-system
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python create_sample_pdfs.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: thanmairepalle454@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: ganeshakhila6@gmail.com
      - key: APP_URL
        sync: false
